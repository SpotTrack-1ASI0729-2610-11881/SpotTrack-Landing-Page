<section class="contact-section" id="contacto">
  <div class="container">
    <h2 class="section-title">{{'contact.title' | translate}}</h2>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'contact.name.label' | translate }}</mat-label>
        <input matInput formControlName="name" [placeholder]="'contact.name.placeholder' | translate">
        <mat-error *ngIf="contactForm.get('name')?.hasError('required')">
          {{'contact.name.error'|translate}}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'contact.email.label' | translate }}</mat-label>
        <input matInput type="email" formControlName="email" [placeholder]="'contact.email.placeholder' | translate">
        <mat-error *ngIf="contactForm.get('email')?.hasError('email')">
          {{'contact.email.error'|translate}}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'contact.message.label' | translate }}</mat-label>
        <textarea matInput rows="5" formControlName="message" [placeholder]="'contact.message.placeholder' | translate"></textarea>
      </mat-form-field>

      <button mat-raised-button class="btn-submit" type="submit" [disabled]="contactForm.invalid">
        {{ 'contact.submit' | translate }}
      </button>

    </form>
  </div>
</section>
