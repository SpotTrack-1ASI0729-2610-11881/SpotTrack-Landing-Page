<section class="contact-section" id="contacto">
  <div class="container">
    <h2 class="section-title">Contacto</h2>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" placeholder="Tu nombre completo">
        <mat-error *ngIf="contactForm.get('name')?.hasError('required')">
          El nombre es obligatorio
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="hola@ejemplo.com">
        <mat-error *ngIf="contactForm.get('email')?.hasError('email')">
          Ingresa un correo válido
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mensaje</mat-label>
        <textarea matInput rows="5" formControlName="message" placeholder="Cuéntanos sobre tu gimnasio"></textarea>
      </mat-form-field>

      <button mat-raised-button class="btn-submit" type="submit" [disabled]="contactForm.invalid">
        Enviar
      </button>

    </form>
  </div>
</section>
