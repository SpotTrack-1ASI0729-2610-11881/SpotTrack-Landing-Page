<section class="contact-section" id="contacto">
  <div class="container">
    <h2 class="section-title">Contacto</h2>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Tu nombre completo"
          [class.invalid]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          [class.invalid]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
      </div>

      <div class="form-group">
        <label for="message">Mensaje</label>
        <textarea
          id="message"
          rows="5"
          formControlName="message"
          placeholder="Cuéntanos sobre tu gimnasio o haz una consulta"
          [class.invalid]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"></textarea>
      </div>

      <button type="submit" class="btn-submit" [disabled]="contactForm.invalid">
        Enviar
      </button>
    </form>
  </div>
</section>
