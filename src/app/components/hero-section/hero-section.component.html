<header [@headerFadeIn] class="hero-header">
  <h1 class="title">{{ 'nav.brand' | translate }}</h1>

  <nav [@navbarFadeIn] class="hero-navbar">
    <button [@hoverNavBtn]="btnStates[0]()" (mouseenter)="btnStates[0].set('hovered')" (mouseleave)="btnStates[0].set('normal')" (click)="scrollToSection('hero')" class="navbar-button">
      {{ 'nav.about' | translate }}
    </button>
    <button [@hoverNavBtn]="btnStates[1]()" (mouseenter)="btnStates[1].set('hovered')" (mouseleave)="btnStates[1].set('normal')" (click)="scrollToSection('features')" class="navbar-button">
      {{ 'nav.features' | translate }}
    </button>
    <button [@hoverNavBtn]="btnStates[2]()" (mouseenter)="btnStates[2].set('hovered')" (mouseleave)="btnStates[2].set('normal')" (click)="scrollToSection('pricing')" class="navbar-button">
      {{ 'nav.pricing' | translate }}
    </button>
    <button [@hoverNavBtn]="btnStates[3]()" (mouseenter)="btnStates[3].set('hovered')" (mouseleave)="btnStates[3].set('normal')" (click)="scrollToSection('contacto')" class="navbar-button">
      {{ 'contact.title' | translate }}
    </button>

    <div class="login-div">
      <button class="login-btn" (click)="navigateToApp()">{{ 'nav.login' | translate }}</button>
    </div>
  </nav>

  <div class="language-switcher">
    <app-language-switcher></app-language-switcher>
  </div>
</header>

<section [@heroFadeIn] class="hero-section" id="hero">
  <div class="hero-wrapper">
    <div class="hero-wrapper-info">
      <div class="particles-overlay"></div>
      <h1>
        {{ 'hero.headlineStart' | translate }}
        <span class="shimmer-text">{{ 'hero.headlineHighlight' | translate }}</span>
        {{ 'hero.headlineEnd' | translate }}
      </h1>
      <p>{{ 'hero.subheadline' | translate }}</p>
    </div>

    <button class="start-btn" (click)="navigateToApp()">{{ 'hero.cta' | translate }}</button>

    <div class="hero-benefits">
      @for (key of benefitKeys; track key) {
        <h2>{{ key | translate }}</h2>
      }
    </div>
  </div>
</section>
