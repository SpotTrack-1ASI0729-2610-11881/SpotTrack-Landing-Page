<section class="st-features-section">
  <div class="st-container">
    <h1 class="st-main-title">{{ 'solution.title' | translate }}</h1>
    <p class="st-main-subtitle">{{ 'solution.subtitle' | translate }}</p>

    <div class="st-grid-container">

      @for (feature of features; track feature.key) {
        <mat-card class="st-card">

          <svg class="st-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            @switch (feature.icon) {
              @case ('sensor') {
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
              }
              @case ('cloud') {
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
              }
              @case ('monitor') {
                <path d="M3 3v18h18"></path>
                <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path>
              }
              @case ('alert') {
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              }
              @case ('dashboard') {
                <path d="M3 3v18h18"></path>
                <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path>
                <polyline points="20 17 12 17 4 17"></polyline>
              }
              @case ('security') {
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              }
            }
          </svg>

          <mat-card-header>
            <mat-card-title class="st-card-title">
              {{ ('solution.' + feature.key + '.title') | translate }}
            </mat-card-title>
          </mat-card-header>

          <mat-card-content>
            <p class="st-card-text">
              {{ ('solution.' + feature.key + '.description') | translate }}
            </p>
          </mat-card-content>

        </mat-card>
      }

    </div>
  </div>
</section>
